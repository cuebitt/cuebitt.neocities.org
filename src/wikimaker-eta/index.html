<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikimaker</title>

    <link rel="stylesheet" href="styles/wikimaker.css" />
    <script src="https://cdn.jsdelivr.net/gh/cuebitt/webcomponents@v1.4.1/components/theme-switcher/theme-switcher.js"></script>

    <style>
      theme-switcher::part(btn) {
        padding: 0;
        border: var(--border-size-2) solid var(--surface-3);
        background: none;
        background-color: var(--surface-1);
        border-radius: 5px;
      }

      [data-theme="dark"] theme-switcher::part(btn) {
        padding: 0;
        border: none;
        background: none;
        background-color: var(--surface-3);
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <header>
      <hgroup>
        <h1>Wikimaker</h1>
        <h2>an easy static wiki page generator!</h2>
      </hgroup>

      <theme-switcher theme="system"></theme-switcher>
    </header>
    <main>
      <div class="column preview-col">
        <iframe id="page-preview-frame"></iframe>
      </div>

      <div class="column builder-col tab-container" x-data="{selected_tab: 0}">
        <div class="tabs-bar">
          <ul role="tablist" class="tab-list">
            <li>
              <button
                role="tab"
                aria-controls="outer-page-tab-panel"
                id="outer-page-tab"
                :aria-selected="selected_tab === 0"
                @click="selected_tab = 0"
              >
                Outer Page
              </button>
            </li>
            <li>
              <button
                role="tab"
                aria-controls="main-sections-tab-panel"
                id="main-sections-tab"
                :aria-selected="selected_tab === 1"
                @click="selected_tab = 1"
              >
                Main Sections
              </button>
            </li>
          </ul>
        </div>

        <div
          class="tab-panels"
          :style="selected_tab === 0 && {borderTopLeftRadius: 0}"
        >
          <div
            role="tabpanel"
            id="outer-page-tab-panel"
            aria-labelledby="outer-page-tab"
            x-show="selected_tab === 0"
            x-data
          >
            <fieldset>
              <legend>Header</legend>
              <div class="fields">
                <label for="header-title">Title</label>
                <input
                  type="text"
                  id="header-title"
                  x-model="$store.builder.header.title"
                />

                <label for="header-subtitle">Subtitle</label>
                <input
                  type="text"
                  id="header-subtitle"
                  x-model="$store.builder.header.subtitle"
                />
              </div>
            </fieldset>

            <fieldset>
              <legend>Page Subject</legend>
              <div class="fields">
                <label for="page-subject-name">Name</label>
                <input
                  type="text"
                  id="page-subject-name"
                  x-model="$store.builder.card.name"
                />

                <label for="page-subject-image-url">Image URL</label>
                <input
                  type="text"
                  id="page-subject-image-url"
                  x-model="$store.builder.card.imageUrl"
                />

                <label for="page-subject-image-alt">Image alt text</label>
                <input
                  type="text"
                  id="page-subject-image-alt"
                  x-model="$store.builder.card.imageAlt"
                />
              </div>
            </fieldset>

            <div class="details-table-container">
              <table>
                <caption>
                  Details
                </caption>
                <thead>
                  <tr>
                    <th>Label</th>
                    <th>Value</th>
                  </tr>
                </thead>
                <tbody>
                  <template
                    x-for="(detail, index) in $store.builder.card.details"
                    :key="detail.key"
                  >
                    <tr>
                      <td>
                        <input type="text" x-model="detail.label" />
                      </td>
                      <td>
                        <input type="text" x-model="detail.value" />
                      </td>
                      <td>
                        <button
                          aria-label="delete row"
                          @click="$store.builder.card.details.splice(index, 1)"
                        >
                          <i class="bi bi-trash3-fill"></i>
                        </button>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>

              <button
                aria-label="add new row"
                @click="$store.builder.addDetail()"
              >
                <i class="bi bi-plus-circle-fill"></i>
              </button>
            </div>
          </div>
          <div
            role="tabpanel"
            id="main-sections-tab-panel"
            aria-labelledby="main-sections-tab"
            x-show="selected_tab === 1"
            x-cloak
          >
            world
          </div>
        </div>
        <div class="update-page-btn-container">
          <button id="update-page-btn">
            <i class="bi bi-magic"></i>
            Update Page
          </button>
        </div>
      </div>
    </main>
    <footer>
      <hr />
      <p
        x-data
        x-text="`© ${new Date().getFullYear()} Cuebitt. All rights reserved.`"
      ></p>
    </footer>

    <!-- init theme switcher button -->
    <script>
      const themeSwitcher = document.querySelector("theme-switcher");

      themeSwitcher.addEventListener("themechange", (e) => {
        document.documentElement.setAttribute(
          "data-theme",
          e.detail.theme === "system" ? "auto" : e.detail.theme,
        );

        localStorage.setItem("theme", e.detail.theme);
      });

      const theme = localStorage.getItem("theme") || "system";
      document.documentElement.setAttribute(
        "data-theme",
        theme === "system" ? "auto" : theme,
      );

      themeSwitcher.setAttribute("theme", theme);
    </script>

    <!-- init app -->
    <!-- do this last since it takes the longest -->
    <script type="module" src="app/app.mjs"></script>
  </body>
</html>
