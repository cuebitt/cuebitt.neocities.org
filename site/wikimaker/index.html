<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikimaker Template</title>

    <link rel="shortcut icon" href="https://fav.farm/🌐" type="image/x-icon" />
    <link rel="stylesheet" href="template/wikimaker.css" data-inline="true" />
    <link rel="stylesheet" href="builder/builder.css" />
  </head>

  <body>
    <div class="header"></div>

    <div class="main-container">
      <aside class="toc-outer">
        <div id="toc"></div>
      </aside>

      <main class="main-content"></main>

      <aside>
        <div id="side-card"></div>
      </aside>
    </div>

    <footer>
      <div class="dropdown-container">
        <button
          class="light-dark-switcher"
          aria-label="light and dark mode switcher"
          id="theme-switcher-trigger"
        >
          <i class="bi bi-moon-stars"></i>
          <i class="bi bi-sun"></i>
          <i class="bi bi-laptop"></i>
        </button>

        <dialog class="dropdown-menu" id="theme-switcher-dialog">
          <form id="theme-switcher">
            <span>
              <input type="radio" name="theme" id="dark" value="dark" />
              <label for="dark">
                <i class="bi bi-moon-stars off"></i>
                <i class="bi bi-moon-stars-fill on"></i>
                Dark
              </label>
            </span>

            <span>
              <input type="radio" name="theme" id="light" value="light" />
              <label for="light">
                <i class="bi bi-sun off"></i>
                <i class="bi bi-sun-fill on"></i>
                Light
              </label>
            </span>

            <span>
              <input type="radio" name="theme" id="system" value="auto" />
              <label for="system">
                <i class="bi bi-laptop off"></i>
                <i class="bi bi-laptop-fill on"></i>
                System
              </label>
            </span>
          </form>
        </dialog>
      </div>
    </footer>

    <!-- functionality for the light/dark mode switcher, included in the generated page -->
    <script
      id="theme-switcher-script"
      src="template/theme-switcher.js"
      data-inline="true"
    ></script>

    <span class="remove-from-generated">
      <!-- templates, not included in the generated page -->
      <template id="right-card-template">
        <div class="card side-card">
          <header>
            <div class="card-header-name"></div>
          </header>
          <div class="card-body">
            <img class="side-image" />
            <table class="side-card-table">
              <tbody class="side-card-table-body"></tbody>
            </table>
          </div>
        </div>
      </template>

      <template id="body-text-section-template">
        <section class="main-section">
          <a class="section-anchor">
            <h1></h1>
          </a>
          <hr />
          <div class="section-body"></div>
        </section>
      </template>

      <template id="toc-template">
        <div class="toc">
          <span class="toc-header">Contents</span>
          <hr />
          <nav>
            <ul class="toc-nav-list"></ul>
          </nav>
        </div>
      </template>

      <template id="header-template">
        <header class="header">
          <hgroup>
            <h1></h1>
            <h2></h2>
          </hgroup>
        </header>
      </template>

      <div id="control-panel">
        <div class="popup">Press <kbd>Esc</kbd> to open the menu!</div>
        <button id="generate-html-btn">Generate HTML</button>
      </div>

      <dialog id="builder-dialog">
        <div id="builder-dialog-inner">
          <header>
            <button id="close-dialog-btn"><i class="bi bi-x-lg"></i></button>
          </header>
          <section>
            <h1>Character Info</h1>

            <div class="options-grid">
              <label for="character-name-input">Name</label>
              <input
                type="text"
                id="character-name-input"
                name="character-name"
              />

              <label for="character-image-input">Image URL</label>
              <input
                type="text"
                id="character-image-input"
                name="character-image-src"
              />

              <label for="character-image-alt-input">Image alt text</label>
              <input
                type="text"
                id="character-image-alt-input"
                name="character-image-alt"
              />
            </div>
            <hr />
          </section>
          <section>
            <h1>Details</h1>
            <table id="details-table">
              <thead>
                <tr>
                  <th>Attribute</th>
                  <th>Value</th>
                  <th></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <span class="add-btn-container"
              ><button id="add-row-btn">
                <i class="bi bi-plus-circle-fill"></i></button
            ></span>
          </section>
          <hr />
          <section>
            <h1>Misc</h1>
            <div id="misc-options" class="options-grid">
              <label for="page-title-input">Page title</label>
              <input type="text" id="page-title-input" />

              <label for="page-subtitle-input">Page subtitle</label>
              <input type="text" id="page-subtitle-input" />
            </div>
          </section>

          <hr />
          <section class="add-btn-container">
            <button id="update-page-btn">Update Wiki Page</button>
          </section>
        </div>
      </dialog>

      <template id="details-entry-template">
        <tr>
          <td><input type="text" name="attribute" /></td>
          <td><input type="text" name="value" /></td>
          <td>
            <button class="del-row-btn">
              <i class="bi bi-trash-fill"></i>
            </button>
          </td>
        </tr>
      </template>

      <!-- used to construct the page, not included in the generated page -->
      <script type="module" src="builder/app.mjs"></script>
    </span>
  </body>
</html>
