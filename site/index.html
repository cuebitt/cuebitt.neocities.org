<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuebitt's Cue Menu</title>

    <!-- meta tags for discord embed -->
    <meta property="og:title" content="Cuebitt @ Neocities" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://cuebitt.neocities.org" />
    <meta
      property="og:image"
      content="http://cuebitt.neocities.org/assets/indigo-tbh.png"
    />
    <meta
      property="og:description"
      content="Cuebitt's super cool website on Neocities! Mooooooo."
    />
    <meta name="theme-color" content="#dfcbfa" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- css stylesheet -->
    <link rel="stylesheet" href="index.css" />

    <!-- npm packages -->
    <script type="importmap">
      {
        "imports": {
          "@floating-ui/dom": "https://cdn.jsdelivr.net/npm/@floating-ui/dom@1.6.3/+esm",
          "howler": "https://cdn.jsdelivr.net/npm/howler@2.2.4/+esm",
          "nanoid": "https://cdn.jsdelivr.net/npm/nanoid@5.0.6/+esm"
        }
      }
    </script>

    <!-- web components -->
    <script
      type="module"
      src="/components/channel-carousel/channel-carousel.js"
    ></script>

    <script
      type="module"
      src="/components/channels/about/about-channel-carousel.js"
    ></script>
    <script
      type="module"
      src="/components/channels/about/about-channel-menu.js"
    ></script>
  </head>

  <!-- TODO -->
  <!-- clean up css classes -->
  <!-- add mobile version -->
  <!-- change "wii" to "cue" in static.png -->
  <!-- style channel divs -->
  <!-- clean up since this is a bit of a mess -->
  <!-- use web components for channels to make them more modular -->

  <body>
    <div id="frame" class="frame o-0 pointer-events-none">
      <channel-carousel
        id="channel-carousel"
        channels-selector=".channel-inner-container"
        style="height: 100%"
      ></channel-carousel>

      <div class="channel-carousel-footer">
        <button
          class="menu-button"
          data-hover-sfx="hover_click"
          data-click-sfx="channel_click,channel_close"
        >
          Cue Menu
        </button>
        <a
          id="start-btn-link"
          href=""
          rel="noopener noreferrer"
          data-hover-sfx="hover_click"
          >Start</a
        >
      </div>
    </div>

    <div class="main-menu">
      <div class="top-section">
        <div class="channels-grid disc-channel">
          <div
            class="channel occupied"
            id="button"
            data-channel-idx="0"
            data-tooltip="Info & Social Links"
            data-url="javascript:alert(`...I haven't made this channel yet.`);"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="disk"
          >
            <div class="channel-inner-container about-me-channel">
              <div class="channel-menu-container">
                <about-channel-menu></about-channel-menu>
              </div>

              <div class="channel-carousel-container">
                <about-channel-carousel
                  small-img-src="assets/misc/img/indigo-tbh.png"
                ></about-channel-carousel>
              </div>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="1"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-url="javascript:alert(`...I haven't made this channel yet.`);"
            data-tooltip="Fursona Art"
            data-channel-sfx="mii"
          >
            <div class="channel-inner-container art-channel">
              <div class="channel-menu-container">
                <hgroup>
                  <h1>Fursona Art</h1>
                  <h3>Channel</h3>
                </hgroup>
              </div>
              <div class="channel-carousel-container"></div>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="2"
            data-tooltip="Webgarden Greenhouse"
            data-url="/greenhouse"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="check_mii_out"
          >
            <div class="channel-inner-container greenhouse-channel">
              <div class="channel-menu-container">
                <hgroup>
                  <h1>Webgarden Greenhouse</h1>
                  <h3>Channel</h3>
                </hgroup>
              </div>
              <div class="channel-carousel-container"></div>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="3"
            data-tooltip="Web Component Shop"
            data-url="/shop"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="shop"
          >
            <div class="channel-inner-container shop-channel">
              <div class="channel-menu-container">
                <hgroup>
                  <h1>Web Component Shop</h1>
                  <h3>Channel</h3>
                </hgroup>
              </div>
              <div class="channel-carousel-container"></div>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="4"
            data-url="/sitemap"
            data-tooltip="Sitemap"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="internet"
          >
            <div class="channel-inner-container sitemap-channel">
              <div class="channel-menu-container">
                <hgroup>
                  <h1>Sitemap</h1>
                  <h3>Channel</h3>
                </hgroup>
              </div>
              <div class="channel-carousel-container"></div>
            </div>
          </div>

          <div
            class="channel"
            data-channel-idx="5"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="6"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="7"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>

          <div
            class="channel"
            data-channel-idx="8"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="9"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="10"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="11"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
        </div>
      </div>

      <div class="bottom-section">
        <div class="bottom-header">
          <p>Cue Menu</p>
          <p style="font-size: 0.75em; text-shadow: none">
            under construction!
          </p>
        </div>

        <div class="bottom-buttons">
          <div class="bottom-button-container left">
            <button
              class="bottom-btn cue-button"
              aria-label="cue button"
              data-hover-sfx="hover_click"
              data-tooltip="🧟‍♂️"
            ></button>
          </div>
          <div class="date-label-container">
            <p id="date-label"></p>
          </div>
          <div class="bottom-button-container right">
            <a
              href="/attribution"
              rel="noopener noreferrer"
              class="bottom-btn mail-button"
              aria-label="mail button"
              data-hover-sfx="hover_click"
              data-tooltip="Credits & Attribution"
            ></a>
          </div>
        </div>
      </div>
    </div>

    <template id="tooltip-template">
      <div id="tooltip" class="tooltip" role="tooltip"></div>
    </template>

    <script type="module" src="/scripts/index.js"></script>
    <script type="module" src="/scripts/tooltips.js"></script>

    <script type="module">
      import { Howl } from "howler";

      let last = -1;

      const zombieSfx = new Howl({
        src: ["https://files.catbox.moe/yos1c2.mp3"],
        volume: 0.125,
        sprite: {
          z0: [10421, 419],
          z1: [200, 900],
          z2: [1148, 745],
          z3: [1994, 511],
          z4: [2488, 469],
          z5: [2974, 511],
          z6: [3493, 573],
          z7: [4071, 662],
          z8: [4934, 737],
          z9: [5780, 947],
          z10: [6752, 527],
          z11: [7305, 921],
          z12: [8276, 737],
          z13: [8997, 611],
          z14: [9709, 310],
          z15: [10052, 310],
        },
      });

      document
        .querySelector(".bottom-btn.cue-button")
        .addEventListener("click", () => {
          // Don't play the same sound effect twice in a row
          let idx = Math.floor(Math.random() * 16);
          if (idx === last) {
            idx = (idx + 1) % 16;
          }

          zombieSfx.play(`z${idx}`);

          last = idx;
        });
    </script>
  </body>
</html>
