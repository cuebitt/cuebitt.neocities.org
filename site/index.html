<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuebitt's Cue Menu</title>

    <!-- meta tags for discord embed -->
    <meta property="og:title" content="Cuebitt @ Neocities" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://cuebitt.neocities.org" />
    <meta
      property="og:image"
      content="http://cuebitt.neocities.org/assets/indigo-tbh.png"
    />
    <meta
      property="og:description"
      content="Cuebitt's super cool website on Neocities! Mooooooo."
    />
    <meta name="theme-color" content="#dfcbfa" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- css stylesheet -->
    <link rel="stylesheet" href="index.css" />

    <!-- npm packages -->
    <script type="importmap">
      {
        "imports": {
          "@floating-ui/dom": "https://cdn.jsdelivr.net/npm/@floating-ui/dom@1.6.3/+esm",
          "howler": "https://cdn.jsdelivr.net/npm/howler@2.2.4/+esm",
          "nanoid": "https://cdn.jsdelivr.net/npm/nanoid@5.0.6/+esm",
          "@splidejs/splide": "https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/+esm"
        }
      }
    </script>

    <!-- web components -->
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/cuebitt/webcomponents@v1.2.0/components/lanyard-status/lanyard-status.min.js"
    ></script>
  </head>

  <!-- TODO -->
  <!-- finish converting script.js to es module -->
  <!-- clean up css classes -->
  <!-- add mobile version -->
  <!-- change "wii" to "cue" in static.png -->
  <!-- move script tag from end of body to separate file -->
  <!-- actually add channels -->
  <!-- make the "cue" and mail buttons do something -->
  <!-- clean up since this is a bit of a mess -->

  <body>
    <div id="frame" class="frame o-0 pointer-events-none">
      <section
        class="splide channel-carousel"
        aria-label="Channel Picker Carousel"
      >
        <div class="splide__arrows channel-carousel-arrows">
          <button
            class="splide__arrow splide__arrow--prev arrow-l"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click"
          ></button>
          <button
            class="splide__arrow splide__arrow--next arrow-r"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click"
          ></button>
        </div>

        <div class="splide__track">
          <ul class="splide__list" id="carousel-list"></ul>
        </div>
      </section>

      <div class="channel-carousel-footer">
        <button
          class="cue-button"
          data-hover-sfx="hover_click"
          data-click-sfx="channel_click,channel_close"
        >
          Cue Menu
        </button>
        <a
          id="start-btn-link"
          href=""
          rel="noopener noreferrer"
          data-hover-sfx="hover_click"
          data-click-sfx="ding"
          >Start</a
        >
      </div>
    </div>

    <!-- a 4x3 grid of divs -->
    <div class="main-menu">
      <div class="top-section">
        <div class="channels-grid">
          <div
            class="channel occupied"
            id="button"
            data-channel-idx="0"
            data-tooltip="About Me Channel"
            data-url="#"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="disk"
          >
            <div class="channel-inner-container about-me-channel">
              <hgroup>
                <h1>About Me<br />+ Social Links</h1>
                <h3>Channel</h3>
              </hgroup>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="1"
            data-tooltip="Webgarden Greenhouse"
            data-url="/greenhouse"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="check_mii_out"
          >
            <div class="channel-inner-container greenhouse-channel">
              <hgroup>
                <h1>Webgarden Greenhouse</h1>
                <h3>Channel</h3>
              </hgroup>
              <div class="iframe-div">
                <iframe
                  src="//cuebitt.neocities.org/webgarden.html"
                  height="250px"
                  width="250px"
                  scrolling="no"
                ></iframe>
              </div>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="2"
            data-url="/sitemap"
            data-tooltip="Sitemap"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="internet"
          >
            <div class="channel-inner-container sitemap-channel">
              <hgroup>
                <h1>Sitemap</h1>
                <h3>Channel</h3>
              </hgroup>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="3"
            data-tooltip="Web Component Shop"
            data-url="/shop"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
            data-channel-sfx="shop"
          >
            <div class="channel-inner-container shop-channel">
              <hgroup>
                <h1>Web Component Shop</h1>
                <h3>Channel</h3>
              </hgroup>

              <div class="demo-div">
                <lanyard-status></lanyard-status>
              </div>
            </div>
          </div>

          <div
            class="channel"
            data-channel-idx="4"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="5"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="6"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="7"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>

          <div
            class="channel"
            data-channel-idx="8"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="9"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="10"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
          <div
            class="channel"
            data-channel-idx="11"
            data-hover-sfx="hover_click"
            data-click-sfx="channel_click,channel_open"
          ></div>
        </div>
      </div>

      <div class="bottom-section">
        <div class="bottom-header">
          <p>Cue Menu</p>
        </div>

        <div class="bottom-buttons">
          <div class="bottom-button-container left">
            <button
              class="bottom-btn cue-button"
              aria-label="cue button"
              data-hover-sfx="hover_click"
              data-click-sfx="ding"
            ></button>
          </div>
          <div class="date-label-container">
            <p id="date-label"></p>
          </div>
          <div class="bottom-button-container right">
            <button
              class="bottom-btn mail-button"
              aria-label="mail button"
              data-hover-sfx="hover_click"
              data-click-sfx="ding"
            ></button>
          </div>
        </div>
      </div>
    </div>

    <template id="tooltip-template">
      <div id="tooltip" class="tooltip" role="tooltip"></div>
    </template>

    <script type="module" src="/scripts/index.js"></script>
    <script type="module" src="/scripts/tooltips.js"></script>
  </body>
</html>
