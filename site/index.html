<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuebitt's Website</title>
    <link
      href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      .flex {
        display: flex;
      }

      .flex-column {
        flex-direction: column;
      }

      .justify-center {
        justify-content: center;
      }

      .outer-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      main {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="outer-container">
      <header class="container">
        <h1>Cuebitt's Website ~ 🐮😇</h1>
      </header>
      <main class="container">
        <div class="flex justify-center" style="margin: 5rem 0">
          <p style="font-size: 2rem">🚧 Homepage Under Construction 🚧</p>
        </div>

        <div class="flex justify-center" style="padding: 0 5rem">
          <p>
            Hi, I'm Cuebitt. I'm a
            <span title="Computer Science">CS</span> student and a furry. I
            haven't actually built my homepage yet so... please see the
            <a href="/sitemap">sitemap</a> for a directory of this website's
            content.
          </p>
        </div>
      </main>
      <footer class="container">
        <hr />
        <div class="flex flex-column">
          <section class="flex justify-center">
            <nav>
              <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/sitemap">Sitemap</a></li>
                <li>
                  <a
                    href="http://github.com/cuebitt/cuebitt.neocities.org"
                    target="_blank"
                    rel="noopener noreferrer"
                    >Source</a
                  >
                </li>
              </ul>
            </nav>
          </section>
          <section class="flex justify-center">
            <a
              href="http://neocities.org"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                alt="Hosted by Neocities"
                src="https://cdn.jsdelivr.net/gh/neocities/neocities@master/public/img/neocitiesbadge.svg"
              />
            </a>
          </section>
        </div>
      </footer>
    </div>
  </body>
</html>
