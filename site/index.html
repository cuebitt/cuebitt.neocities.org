<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuebitt's Cue Menu</title>

    <!-- meta tags for discord embed -->
    <meta property="og:title" content="Cuebitt @ Neocities" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://cuebitt.neocities.org" />
    <meta
      property="og:image"
      content="http://cuebitt.neocities.org/assets/indigo-tbh.png"
    />
    <meta
      property="og:description"
      content="Cuebitt's super cool website on Neocities! Mooooooo."
    />
    <meta name="theme-color" content="#dfcbfa" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="stylesheet" href="index.css" />

    <script type="importmap">
      {
        "imports": {
          "@floating-ui/dom": "https://cdn.jsdelivr.net/npm/@floating-ui/dom@1.6.3/+esm",
          "howler": "https://cdn.jsdelivr.net/npm/howler@2.2.4/+esm",
          "nanoid": "https://cdn.jsdelivr.net/npm/nanoid@5.0.6/+esm",
          "@splidejs/splide": "https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/+esm"
        }
      }
    </script>

    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/cuebitt/webcomponents@v1.2.0/components/lanyard-status/lanyard-status.min.js"
    ></script>
  </head>

  <!-- TODO -->
  <!-- finish converting script.js to es module -->
  <!-- clean up css classes -->
  <!-- add mobile version -->
  <!-- change "wii" to "cue" in static.png -->
  <!-- move script tag from end of body to separate file -->
  <!-- actually add channels -->
  <!-- make the "cue" and mail buttons do something -->
  <!-- clean up since this is a bit of a mess -->

  <body>
    <div id="frame" class="frame o-0">
      <section
        class="splide channel-carousel"
        aria-label="Channel Picker Carousel"
      >
        <div class="splide__arrows channel-carousel-arrows">
          <button class="splide__arrow splide__arrow--prev arrow-l"></button>
          <button class="splide__arrow splide__arrow--next arrow-r"></button>
        </div>

        <div class="splide__track">
          <ul class="splide__list" id="carousel-list"></ul>
        </div>
      </section>

      <div class="channel-carousel-footer">
        <button onclick="window.WiiMenuJS.closeChannelCarousel()">
          Cue Menu
        </button>
        <a id="start-btn-link" href="" rel="noopener noreferrer">Start</a>
      </div>
    </div>

    <!-- a 4x3 grid of divs -->
    <div class="main-menu">
      <div class="top-section">
        <div class="channels-grid">
          <div
            class="channel occupied"
            id="button"
            data-channel-idx="0"
            data-tooltip="Disk Channel"
            data-sfx-idx="0"
            data-url="#"
          >
            <div class="channel-inner-container">
              <p>hello world</p>
            </div>
          </div>

          <div
            class="channel occupied"
            data-channel-idx="1"
            data-tooltip="Webgarden Greenhouse"
            data-sfx-idx="1"
            data-url="/greenhouse"
          >
            <div class="channel-inner-container greenhouse-channel">
              <hgroup>
                <h1>Webgarden Greenhouse</h1>
                <h3>Channel</h3>
              </hgroup>
              <div class="iframe-div">
                <iframe
                  src="//cuebitt.neocities.org/webgarden.html"
                  height="250px"
                  width="250px"
                  scrolling="no"
                ></iframe>
              </div>
            </div>
          </div>
          <div
            class="channel occupied"
            data-channel-idx="2"
            data-tooltip="Web Component Shop"
            data-sfx-idx="2"
            data-url="/shop"
          >
            <div class="channel-inner-container shop-channel">
              <hgroup>
                <h1>Web Component Shop</h1>
                <h3>Channel</h3>
              </hgroup>

              <div class="demo-div">
                <lanyard-status></lanyard-status>
              </div>
            </div>
          </div>
          <div
            class="channel occupied"
            data-channel-idx="3"
            data-url="/sitemap"
            data-tooltip="Sitemap"
            data-sfx-idx="3"
          >
            <div class="channel-inner-container sitemap-channel">
              <hgroup>
                <h1>Sitemap</h1>
                <h3>Channel</h3>
              </hgroup>
            </div>
          </div>

          <div class="channel" data-channel-idx="4"></div>
          <div class="channel" data-channel-idx="5"></div>
          <div class="channel" data-channel-idx="6"></div>
          <div class="channel" data-channel-idx="7"></div>

          <div class="channel" data-channel-idx="8"></div>
          <div class="channel" data-channel-idx="9"></div>
          <div class="channel" data-channel-idx="10"></div>
          <div class="channel" data-channel-idx="11"></div>
        </div>
      </div>

      <div class="bottom-section">
        <div class="bottom-header">
          <p>Cue Menu</p>
        </div>

        <div class="bottom-buttons">
          <div class="bottom-button-container left">
            <button
              class="bottom-btn cue-button"
              aria-label="cue button"
            ></button>
          </div>
          <div class="date-label-container">
            <p id="date-label"></p>
          </div>
          <div class="bottom-button-container right">
            <button
              class="bottom-btn mail-button"
              aria-label="mail button"
            ></button>
          </div>
        </div>
      </div>
    </div>

    <template id="tooltip-template">
      <div id="tooltip" class="tooltip" role="tooltip"></div>
    </template>

    <script type="module" src="script.js"></script>

    <script type="module">
      import { computePosition } from "@floating-ui/dom";
      import { Howl } from "howler";
      import { nanoid } from "nanoid";

      // Init WiiMenuJS
      WiiMenuJS.init();

      // Init date label
      // Set the date label's value
      document.getElementById("date-label").textContent =
        WiiMenuJS.formatDate();

      // Create tooltips
      const tooltipElems = [];
      document
        .querySelectorAll(".channel.occupied[data-tooltip]")
        .forEach((channel) => {
          const tooltip = document
            .getElementById("tooltip-template")
            .content.cloneNode(true);
          tooltip.querySelector("#tooltip").textContent =
            channel.dataset.tooltip;

          const id = nanoid();

          tooltip.querySelector("#tooltip").id = id;
          document.body.appendChild(tooltip);

          channel.setAttribute("aria-describedby", id);

          tooltipElems.push({
            elem: channel,
            tooltip: document.getElementById(`${id}`),
          });
        });

      // Tooltip hover sound
      let tooltipAppearSfxReady = false;
      var tooltipAppearSfx = new Howl({
        src: ["https://files.catbox.moe/3x2h7u.mp3"],
        volume: 0.3,
        onload: () => {
          tooltipAppearSfxReady = true;
        },
      });

      const update = (elem, tooltip) => {
        computePosition(elem, tooltip).then(({ x, y }) => {
          Object.assign(tooltip.style, {
            left: `${x}px`,
            top: `${y}px`,
          });
        });
      };

      function showTooltip(elem, tooltip) {
        tooltip.style.display = "block";
        update(elem, tooltip);
        if (tooltipAppearSfxReady) {
          tooltipAppearSfx.play();
        }
      }

      function hideTooltip(elem, tooltip) {
        tooltip.style.display = "";
      }

      tooltipElems.forEach(({ elem, tooltip }) => {
        [
          ["mouseenter", showTooltip],
          ["mouseleave", hideTooltip],
          ["focus", showTooltip],
          ["blur", hideTooltip],
        ].forEach(([event, listener]) => {
          elem.addEventListener(event, () => {
            listener(elem, tooltip);
          });
        });
      });
    </script>
  </body>
</html>
