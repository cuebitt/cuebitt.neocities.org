<!doctype html>
<html lang="en">
  <!-- 
    wiMDy by Cuebitt (cuebitt.neocities.org)

    a simple, barebones markdown blog system for Neocities
  -->

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wiMDy, an easy static blog renderer</title>

    <!-- this css sheet "normalizes" browsers' default styles. it helps to make your website look consistent across browsers -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
      integrity="sha512-4xo8blKMVCiXpTaLzQSLSw3KFOVPWhm/TRtuPVc4WG6kUgjH6J03IBuG7JZPkcWMxJ5huwaBpOpnwYElP/m6wg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- used for code syntax highlighting -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css"
    />

    <link rel="stylesheet" href="blog/blog.css" />
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>wiMDy Demo Blog</h1>
        <nav>
          <ul>
            <li>
                <a href="/">Home</a>
            </li>
            <li>
              <!-- linking to blog.html (with no query parameter) leads to the post archive page -->
              <a href="/blog.html">Archive</a>
            </li>
          </ul>
        </nav>
      </header>

      <hr />
      <main>
        <div class="container">
          <!-- stores the loading animation -->
          <div id="loader-wrapper">
            <div class="loader"></div>
          </div>

          <!-- this hgroup will be used to display the title and subtitle (author, date) of the post -->
          <hgroup id="post-heading" class="hidden">
            <h1 id="post-title"></h1>
            <p id="post-subtitle"></p>
          </hgroup>

          <!-- posts from .md files will be inserted into this div -->
          <div id="blog-post"></div>

          <!-- if this is the archive page, the list will be inserted here -->
          <div id="archive-wrapper">
            <ul id="archive-list"></ul>
          </div>
        </div>
      </main>
      <hr />
      <footer>
        <p>Built with wiMDy :)</p>
      </footer>
    </div>

    <!-- this template will be used to create a list of links to the blog posts if this is the archive page -->
    <template id="archive-template">
      <li>
        <a href="" target="_self"></a>
      </li>
    </template>
    <script type="module" src="blog/wiMDy.js"></script>
  </body>
</html>
